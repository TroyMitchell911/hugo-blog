baseURL = "https://troy-y.org/hugo-blog/"
title = "Troy's Blog"
theme = "PaperMod"
paginate = 20
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    [languages.en.params]
      defaultTheme = "auto"
      ShowReadingTime = true
      ShowShareButtons = false
      ShowPostNavLinks = true
      ShowBreadCrumbs = true
      ShowCodeCopyButtons = true
      ShowToc = true
    [languages.en.params.homeInfoParams]
      Title = "Hey there 👋"
      Content = "Welcome to my blog"
    [[languages.en.params.socialIcons]]
      name = "github"
      url = "https://github.com/TroyMitchell911"
    [[languages.en.menu.main]]
      identifier = "archives"
      name = "Archives"
      url = "/archives/"
      weight = 5
    [[languages.en.menu.main]]
      identifier = "tags"
      name = "Tags"
      url = "/tags/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "search"
      name = "Search"
      url = "/search/"
      weight = 15

  [languages.zh]
    languageName = "中文"
    weight = 2
    languageCode = "zh-CN"
    [languages.zh.params]
      defaultTheme = "auto"
      ShowReadingTime = true
      ShowShareButtons = false
      ShowPostNavLinks = true
      ShowBreadCrumbs = true
      ShowCodeCopyButtons = true
      ShowToc = true
    [languages.zh.params.homeInfoParams]
      Title = "你好 👋"
      Content = "欢迎来到我的博客"
    [[languages.zh.params.socialIcons]]
      name = "github"
      url = "https://github.com/TroyMitchell911"
    [[languages.zh.menu.main]]
      identifier = "archives"
      name = "归档"
      url = "/zh/archives/"
      weight = 5
    [[languages.zh.menu.main]]
      identifier = "tags"
      name = "标签"
      url = "/zh/tags/"
      weight = 10
    [[languages.zh.menu.main]]
      identifier = "search"
      name = "搜索"
      url = "/zh/search/"
      weight = 15

[outputs]
  home = ["HTML", "RSS", "JSON"]
